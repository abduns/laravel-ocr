name: Tests

env:
  MINIMUM_COVERAGE: '60.0'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^13.0'
            testbench: '^11.0'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, gd, imagick
          coverage: pcov

      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng ghostscript

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Run Tests
        env:
          OCR_INTEGRATION: '1'
          TESSERACT_BIN: /usr/bin/tesseract
        run: vendor/bin/phpunit --coverage-clover=build/clover.xml

      - name: Check Coverage
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('build/clover.xml');
            \$metrics = \$xml->project->metrics;
            \$stmts = (int)\$metrics['statements'];
            \$covered = (int)\$metrics['coveredstatements'];
            echo \$stmts > 0 ? round((\$covered / \$stmts) * 100, 2) : 0;
          ")
          echo "Coverage: ${COVERAGE}%"
          php -r "exit((float)'${COVERAGE}' >= (float)'${MINIMUM_COVERAGE}' ? 0 : 1);"
